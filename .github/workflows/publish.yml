# Auto-generated by scripts/create-plugin-repo.mjs — this is the plugin's own CI.
#
# On every push to `main` it type-checks, builds the bundle, and — when
# package.json's version has no matching tag yet — publishes a `v<version>` tag
# whose tree contains the built `dist/`, then registers the resulting jsDelivr
# URLs with the platform. `main` itself never gains a committed `dist/`.
#
# Required repo configuration (Settings → Secrets and variables → Actions):
#   vars.PLATFORM_URL            platform origin, e.g. https://ed-tech-platform.vercel.app
#   secrets.PLUGIN_PUBLISH_TOKEN must equal the platform's PLUGIN_PUBLISH_TOKEN
#
# The platform must also have PLUGIN_GITHUB_OWNER set to this repo's owner so
# the publish endpoint accepts these jsDelivr URLs.

name: Publish plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: publish-${{ github.ref }}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PLUGIN_ID: grade-8.physics.electromagnetic-flux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --no-frozen-lockfile

      # --- checks upon upload ---
      - name: Test
        run: pnpm test

      - name: Type-check
        run: pnpm typecheck

      - name: Build bundle
        run: pnpm build:github

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check for existing tag
        id: tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish version tag with built dist
        if: steps.tag.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git commit -m "build: v${version}"
          git tag "v${version}"
          git push origin "v${version}"

      - name: Compute integrity (sha384)
        id: integrity
        run: echo "value=sha384-$(openssl dgst -sha384 -binary dist/index.js | openssl base64 -A)" >> "$GITHUB_OUTPUT"

      - name: Register with platform
        if: steps.tag.outputs.exists == 'false'
        env:
          PLATFORM_URL: ${{ vars.PLATFORM_URL }}
          PLUGIN_PUBLISH_TOKEN: ${{ secrets.PLUGIN_PUBLISH_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          VERSION: ${{ steps.version.outputs.value }}
          INTEGRITY: ${{ steps.integrity.outputs.value }}
        run: |
          base="https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@v${VERSION}/dist"
          # Strip trailing slashes so the join below cannot produce `//api/...`,
          # which Vercel redirects (and curl without -L would not follow).
          platform_url="${PLATFORM_URL%/}"
          body=$(cat <<JSON
          {
            "pluginId": "${PLUGIN_ID}",
            "version": "${VERSION}",
            "manifestUrl": "${base}/manifest.json",
            "entryUrl": "${base}/index.js",
            "integrity": "${INTEGRITY}"
          }
          JSON
          )
          curl --fail --show-error --silent --location \
            -X POST "${platform_url}/api/registry/publish" \
            -H "Authorization: Bearer ${PLUGIN_PUBLISH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${body}"
